```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker X</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    background:
    linear-gradient(
    135deg,
    #000000,
    #111111,
    #2b0000,
    #550000);
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

.header h1{
    color:#ff3b3b;
    font-size:3rem;
    text-shadow:0 0 20px #ff0000;
}

.header p{
    color:#cccccc;
    margin-top:10px;
}

.panel{
    background:rgba(20,20,20,0.85);
    border:1px solid rgba(255,0,0,0.2);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    color:white;
    backdrop-filter:blur(10px);
    box-shadow:0 0 15px rgba(255,0,0,0.15);
}

.panel h2{
    color:#ff4d4d;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#1f1f1f;
    color:white;
    border:1px solid #444;
}

input::placeholder{
    color:#999;
}

.add-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ff1a1a;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.add-btn:hover{
    background:#ff3333;
    box-shadow:0 0 20px #ff0000;
}

.dashboard{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:
    linear-gradient(
    135deg,
    #330000,
    #990000);
    border-radius:18px;
    padding:20px;
    text-align:center;
    color:white;
}

.card h3{
    color:#ff9999;
}

.card p{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#b30000;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    color:white;
    border-bottom:1px solid #333;
}

tr:hover{
    background:#1a1a1a;
}

.delete-btn{
    background:#ff1a1a;
    border:none;
    color:white;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#cc0000;
}

.footer{
    text-align:center;
    color:#ff6666;
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="logo">💪🔥⚡</div>
    <h1>Fitness Tracker X</h1>
    <p>Track Progress • Build Strength • Stay Consistent</p>
</div>

<div class="panel">

<h2>Add Workout</h2>

<input
type="text"
id="exercise"
placeholder="Exercise Type">

<input
type="number"
id="time"
placeholder="Workout Time (Minutes)">

<input
type="number"
id="calories"
placeholder="Calories Burned">

<button
class="add-btn"
onclick="addWorkout()">
➕ Add Workout
</button>

</div>

<div class="panel">

<h2>Performance Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Total Activities</h3>
<p id="totalActivities">0</p>
</div>

<div class="card">
<h3>Total Time</h3>
<p id="totalTime">0</p>
</div>

<div class="card">
<h3>Total Calories</h3>
<p id="totalCalories">0</p>
</div>

</div>

</div>

<div class="panel">

<h2>Workout History</h2>

<table>

<thead>
<tr>
<th>Exercise</th>
<th>Time</th>
<th>Calories</th>
<th>Action</th>
</tr>
</thead>

<tbody id="activityTable">
</tbody>

</table>

</div>

<div class="footer">
🔥 NO PAIN • NO GAIN 🔥
</div>

</div>

<script>

let activities =
JSON.parse(localStorage.getItem("activities")) || [];

function saveData(){
localStorage.setItem(
"activities",
JSON.stringify(activities)
);
}

function addWorkout(){

let exercise =
document.getElementById("exercise").value;

let time =
parseInt(document.getElementById("time").value) || 0;

let calories =
parseInt(document.getElementById("calories").value) || 0;

if(exercise===""){
alert("Please enter exercise type");
return;
}

activities.push({
exercise,
time,
calories
});

saveData();
displayData();

document.getElementById("exercise").value="";
document.getElementById("time").value="";
document.getElementById("calories").value="";
}

function deleteWorkout(index){

if(confirm("Delete this workout?")){

activities.splice(index,1);

saveData();
displayData();

}
}

function displayData(){

let table =
document.getElementById("activityTable");

table.innerHTML="";

let totalTime=0;
let totalCalories=0;

activities.forEach((activity,index)=>{

totalTime += activity.time;
totalCalories += activity.calories;

table.innerHTML += `
<tr>
<td>${activity.exercise}</td>
<td>${activity.time}</td>
<td>${activity.calories}</td>
<td>
<button
class="delete-btn"
onclick="deleteWorkout(${index})">
Delete
</button>
</td>
</tr>
`;
});

document.getElementById("totalActivities")
.innerText = activities.length;

document.getElementById("totalTime")
.innerText = totalTime;

document.getElementById("totalCalories")
.innerText = totalCalories;
}

displayData();

</script>

</body>
</html>
```
